<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The YHC Way</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Connecting...</p>
    </div>

    <div id="login-view" class="view hidden">
      <div class="header">
        <img src="../icons/icon48.png" alt="YHC Way" class="logo">
        <h1>The YHC Way</h1>
      </div>
      <div class="content">
        <p>Connect your extension to YHC Way</p>
        <div id="token-entry" class="token-entry">
          <input type="password" id="token-input" placeholder="Paste your connection token" class="token-input">
          <button id="connect-btn" class="btn btn-primary">Connect</button>
        </div>
        <div class="divider">
          <span>or</span>
        </div>
        <button id="login-btn" class="btn btn-secondary">Get Token from Settings</button>
        <p class="help-text">
          Go to Settings &gt; Browser Extension in YHC Way to generate a token
        </p>
      </div>
    </div>

    <div id="main-view" class="view hidden">
      <div class="header">
        <div class="header-left">
          <img src="../icons/icon32.png" alt="YHC" class="logo-small">
          <span class="user-name" id="user-name"></span>
        </div>
        <div class="header-right">
          <button id="refresh-btn" class="icon-btn" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
            </svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="tasks">Tasks</button>
        <button class="tab" data-tab="calendar">Calendar</button>
        <button class="tab" data-tab="time">Time</button>
        <button class="tab" data-tab="ai">AI</button>
      </nav>

      <div class="tab-content">
        <div id="tab-overview" class="tab-panel active">
          <div class="notifications-section">
            <h3>Notifications</h3>
            <div id="notifications-list" class="list"></div>
          </div>
          <div class="quick-actions">
            <button id="quick-task" class="action-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 5v14M5 12h14"/>
              </svg>
              New Task
            </button>
            <button id="quick-note" class="action-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              Quick Note
            </button>
            <button id="open-app" class="action-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Open App
            </button>
          </div>
        </div>

        <div id="tab-tasks" class="tab-panel hidden">
          <div class="task-input">
            <input type="text" id="new-task-input" placeholder="Add a new task...">
            <button id="add-task-btn" class="btn btn-primary btn-sm">Add</button>
          </div>
          <div id="tasks-list" class="list"></div>
        </div>

        <div id="tab-calendar" class="tab-panel hidden">
          <div class="today-date" id="today-date"></div>
          <div id="events-list" class="list"></div>
        </div>

        <div id="tab-time" class="tab-panel hidden">
          <div class="time-tracker">
            <div class="timer-display" id="timer-display">00:00:00</div>
            <div class="timer-controls">
              <button id="timer-start" class="btn btn-primary">Start</button>
              <button id="timer-stop" class="btn btn-secondary hidden">Stop</button>
            </div>
            <input type="text" id="timer-description" placeholder="What are you working on?">
          </div>
          <div id="recent-sessions" class="list"></div>
        </div>

        <div id="tab-ai" class="tab-panel hidden">
          <div class="ai-section">
            <textarea id="ai-input" placeholder="Ask anything about your workspace, summarize content, or draft a message..."></textarea>
            <button id="ai-submit" class="btn btn-primary">Ask AI</button>
          </div>
          <div id="ai-response" class="ai-response hidden"></div>
          <div class="ai-quick-actions">
            <button class="ai-quick-btn" data-action="briefing">Daily Briefing</button>
            <button class="ai-quick-btn" data-action="prioritize">Prioritize Tasks</button>
            <button class="ai-quick-btn" data-action="summarize">Summarize Page</button>
          </div>
        </div>
      </div>

      <div id="quick-add-modal" class="modal hidden">
        <div class="modal-content">
          <h3 id="modal-title">Quick Add</h3>
          <textarea id="modal-input" placeholder=""></textarea>
          <div class="modal-actions">
            <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
            <button id="modal-save" class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
